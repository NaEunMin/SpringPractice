<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>게시판</title></head>
<body>
<h1>게시판</h1>
<a th:href="@{/board/new}">새 글 작성</a>
<form action="/board/deleteAll" method="post" style="display:inline;">
    <button type="submit" onclick="return confirm('정말 전체 삭제할까요?');">전체 삭제</button>
</form>

<ul>
    <li th:each="board : ${boards}">
        <a th:href="@{/board/{id}(id=${board.id})}" th:text="${board.title}"></a>
    </li>
</ul>
</body>
</html>
