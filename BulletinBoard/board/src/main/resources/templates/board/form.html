<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>게시글 작성/수정</title></head>
<body>
<h1 th:text="${#strings.isEmpty(board.id) ? '새 글 작성' : '글 수정'}"></h1>
<form th:action="@{${#strings.isEmpty(board.id) ? '/board' : '/board/' + board.id + '/edit'}}" method="post">
    제목: <input type="text" name="title" th:value="${board.title}"/><br/>
    내용: <textarea name="content" th:text="${board.content}"></textarea><br/>
    <button type="submit">저장</button>
</form>
</body>
</html>
